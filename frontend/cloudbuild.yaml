# Build the dashboard image with the backend URL baked in (NEXT_PUBLIC_* is build-time).
# Usage:
#   gcloud builds submit frontend --config frontend/cloudbuild.yaml \
#     --substitutions=_API_URL=https://beacon-api-xxxx.run.app,_IMAGE=gcr.io/PROJECT/beacon-web
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_API_URL}
      - -t
      - ${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}"]
images: ["${_IMAGE}"]
options:
  logging: CLOUD_LOGGING_ONLY
